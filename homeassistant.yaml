# Home Assistant Lovelace view for the Mecer 32L81F
# Add this under your dashboard's `views:` list (raw config editor).
# Requires custom:button-card (HACS). Sends via the studio Tasmota IR blaster.
title: MECER 32L81F
path: mecer-32l81f
icon: mdi:remote-tv
badges: []
cards:
- type: vertical-stack
  cards:
  - type: horizontal-stack
    cards:
    - type: custom:button-card
      name: POWER
      icon: mdi:power
      tap_action:
        action: call-service
        service: mqtt.publish
        service_data:
          topic: cmnd/ir-studio1/irsend
          payload: '{"Protocol":"NEC","Bits":32,"Data":"0x020250AF","Repeat":1}'
      styles:
        icon:
        - color: red
    - type: custom:button-card
