# Mecer 32L81F  -  LIRC remote definition
# MStar TSUMV56 / KTC V56T4C1.  NEC protocol, 32-bit extended frames.
# Reverse-engineered from the firmware (Aeon ISA disassembly of the PM IR tree).
#
#   "codes" values are the low 16 bits; the address/customer code is in pre_data.
#   Concatenated MSB-first they reproduce the exact wire frame, e.g.
#   POWER = pre_data 0x0202 + code 0x50AF = 0x020250AF.
#
# Two remotes are defined:
#   mecer_32l81f          - everyday user keys (customer code 0x4040)
#   mecer_32l81f_service  - engineer/service keys (customer code 0x4141)
#
# Install:  copy to /etc/lirc/lircd.conf.d/  then  sudo systemctl restart lircd
# Test:     irsend SEND_ONCE mecer_32l81f KEY_POWER

begin remote
  name              mecer_32l81f
  bits              16
  flags             SPACE_ENC|CONST_LENGTH
  eps               30
  aeps              100
  header            9000  4500
  one                560  1690
  zero               560   560
  ptrail             560
  repeat            9000  2250
  pre_data_bits     16
  pre_data          0x0202
  gap               108000
  toggle_bit_mask   0x0
  frequency         38000

  begin codes
      KEY_POWER          0x50AF
      KEY_MENU           0x02FD      # also acts as BACK
      KEY_EXIT           0x04FB
      KEY_UP             0xD02F
      KEY_DOWN           0x708F
      KEY_LEFT           0x08F7
      KEY_RIGHT          0x8877
      KEY_OK             0xB04F
      KEY_VOLUMEUP       0xA857
      KEY_VOLUMEDOWN     0x38C7
      KEY_MUTE           0xF00F
      KEY_CHANNELUP      0xF807
      KEY_CHANNELDOWN    0x7887
      KEY_0              0xA25D
      KEY_1              0x807F
      KEY_2              0x40BF
      KEY_3              0xC03F
      KEY_4              0x20DF
      KEY_5              0xA05F
      KEY_6              0x609F
      KEY_7              0xE01F
      KEY_8              0x10EF
      KEY_9              0x906F
      KEY_PMODE          0x42BD      # picture mode
      KEY_COLORTEMP      0xC23D      # colour temperature
      KEY_ASPECT         0x9867      # zoom / aspect
      KEY_SOUND          0x58A7      # sound mode
      KEY_INFO           0x6897
      KEY_PREVIOUS       0x18E7      # last channel
      KEY_CHANNELLIST    0xB847
      KEY_SOURCE         0x827D
      KEY_TV             0xD22D
      KEY_HDMI           0xEF10
      KEY_AUX            0x728D      # AV
      KEY_PC             0xAF50
      KEY_TEXT           0x48B7      # teletext / TTX
      KEY_PALNTSC        0x629D      # colour system PAL/NTSC/SECAM/Auto
      KEY_FREEZE         0x00FF
      KEY_SLEEP          0xE817
      KEY_FACTORY1       0xF20D      # limited factory menu (vendor 0x40)
  end codes
end remote

begin remote
  name              mecer_32l81f_service
  bits              16
  flags             SPACE_ENC|CONST_LENGTH
  eps               30
  aeps              100
  header            9000  4500
  one                560  1690
  zero               560   560
  ptrail             560
  repeat            9000  2250
  pre_data_bits     16
  pre_data          0x8282
  gap               108000
  toggle_bit_mask   0x0
  frequency         38000

  begin codes
      KEY_FACTORY2       0x6D92      # factory menu via vendor 0x41
      KEY_FACTORY3       0xF708      # factory/adjust twin
      KEY_INTERNALINFO   0x5DA2      # internal information menu
      KEY_HDCP           0xBD42      # HDCP service OSD
  end codes
end remote
